name: Deploy naar GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Rechten die de officiële Pages-deploy nodig heeft
permissions:
  contents: read
  pages: write
  id-token: write

# Eén deploy tegelijk; nieuwe push verdringt een lopende run
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # Detecteert de package manager via de lockfile, installeert en bouwt
      # de Astro-site en uploadt dist/ als Pages-artifact.
      - name: Build met Astro
        uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publiceren naar GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
